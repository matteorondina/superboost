body{font-family:'Sora',sans-serif;background:#050510;min-height:100vh;overflow-x:hidden}
#login-screen{

}

}

.login-badge{

}

}

}
.login-sub{font-size:15px;color:rgba(255,255,255,.35);margin-bottom:48px;line-height:1.6;font-weight:300}
.login-input-wrap{

  transition:border-color .3s;
}
.login-input-wrap:focus-within{border-color:rgba(233,30,99,.4)}
.login-input{

  color:#fff;font-size:15px;font-family:'Sora',sans-serif;
}
.login-input::placeholder{color:rgba(255,255,255,.25)}
.login-btn{

  color:#fff;font-weight:700;font-size:14px;cursor:pointer;
  font-family:'Sora',sans-serif;transition:all .3s;
  box-shadow:0 4px 20px rgba(233,30,99,.3);
}
.login-btn:hover{transform:scale(1.02);box-shadow:0 8px 32px rgba(233,30,99,.4)}
.login-btn:disabled{opacity:.5;cursor:default;transform:none}
.login-error{

}
.login-error.show{opacity:1}
.login-footer{

  letter-spacing:2px;text-transform:uppercase;font-weight:600;
}
.login-lock{
  width:48px;height:48px;margin:0 auto 24px;border-radius:14px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
#app{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes iridescent{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;
  display:inline-block;vertical-align:middle;
}

<script>
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
}

async function decryptContent(password) {
  const p = JSON.parse(document.getElementById("enc-payload").textContent);
  const salt = Uint8Array.from(atob(p.salt), c => c.charCodeAt(0));
  const iv = Uint8Array.from(atob(p.iv), c => c.charCodeAt(0));
  const tag = Uint8Array.from(atob(p.tag), c => c.charCodeAt(0));
  const data = Uint8Array.from(atob(p.data), c => c.charCodeAt(0));
  const combined = new Uint8Array(data.length + tag.length);
  combined.set(data);
  combined.set(tag, data.length);
  const key = await deriveKey(password, salt);
  const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, combined);
  return new TextDecoder().decode(dec);
}

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function attemptLogin() {
  const pwd = document.getElementById("pwd").value;
  if (!pwd) return;
  const btn = document.getElementById("loginBtn");
  const error = document.getElementById("error");
  const origText = btn.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  error.classList.remove("show");

  try {
    const jsxCode = await decryptContent(pwd);

    // Success
    document.getElementById("login-screen").style.opacity = "0";
    document.getElementById("login-screen").style.transition = "opacity 0.5s";
    setTimeout(() => {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.body.style.background = "#FAFAFE";
    }, 500);

    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js");
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js");
    await loadScript("https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js");

    // Transform imports for standalone browser execution
    let code = jsxCode
      .replace(/import\s*\{([^}]+)\}\s*from\s*["']react["'];?/g, "const {$1} = React;")
      .replace(/export\s+default\s+function/g, "function")
      .replace(/export\s+default\s+/g, "");

    code += "\nReactDOM.createRoot(document.getElementById('app')).render(React.createElement(SuperBoostLanding));";

    const script = document.createElement("script");
    script.type = "text/babel";
    script.setAttribute("data-type", "module");
    script.textContent = code;
    document.body.appendChild(script);

    if (window.Babel) Babel.transformScriptTags();

  } catch (e) {
    console.error("Decrypt failed:", e);
    error.classList.add("show");
    btn.disabled = false;
    btn.textContent = origText;
  }
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("pwd").addEventListener("keydown", e => {
    if (e.key === "Enter") attemptLogin();
  });
  document.getElementById("pwd").focus();
});
</script>
